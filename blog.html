---
layout: default
title: Blog
---
<ul id="posts">
  {% for post in site.posts %}
    <li class="post">
      <div class="post-header"><a href="{{ post.url }}">{{ post.title }}</a>
      <span class="date">{{post.date | date: "%b %d, %Y" }}</span></div>
      <div class="excerpt">{{ post.excerpt }}</div>
    </li>
  {% endfor %}
</ul>

<style>
  .post {
    list-style:none;
  }

  .post a{
    font-weight:bold;
    font-size: 25px;
  }

  .post .date {
    float: right;
  }

  #posts {
     padding-left: 0px;
  }

  .post-header {
    border-bottom: 4px solid #BADA55;
  }
</style>
