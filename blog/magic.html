---
layout: default
title: "Blog: <span id='category'>Magic</span>"
---

<ul id="posts">
  {% for post in site.posts %}
   {% if post.category == "magic" %}
    <li class="post {{ post.category }}">
      <div class="post-header"><a href="{{ post.url }}">{{ post.title }}</a>
      <span class="date">{{post.date | date: "%b %d, %Y" }}</span></div>
      <div class="excerpt">{{ post.excerpt }}</div>
    </li>
    {% endif %}
  {% endfor %}
</ul>

<style>

  #category {
    color: #9728a1;
  }

  .post {
    list-style:none;
  }

  .post-header a{
    font-weight:bold;
    font-size: 25px;
  }

  .post .date {
    float: right;
  }

  #posts {
    margin-top: 8px;
     padding-left: 0px;
  }

  .math .post-header {
    border-bottom: 4px solid #0085FF;
  }

  .math .category {
    background: #0085FF;
    border-bottom: 2px solid #0085FF;
  }

  .magic .post-header {
    border-bottom: 4px solid #9728a1;
  }

  .magic .category {
    background: #9728a1;
    border-bottom: 2px solid #9728a1;
  }

  .media .post-header {
    border-bottom: 4px solid #FF9000;
  }

  .media .category {
    background: #FF9000;
    border-bottom: 2px solid #FF9000;
  }

  .category {
    display: inline-block;
    padding: 2px;
    border-radius: 10px 10px 0px 0px; 
    margin-left: 10px;
    color: white;
    text-shadow: none;
    font-weight: bold;
  }
</style>
